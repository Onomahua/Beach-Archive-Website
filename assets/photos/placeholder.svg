<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Sand background -->
  <rect width="400" height="300" fill="#EAE2D0"/>
  <!-- Subtle sand ripple lines -->
  <path d="M0,80 Q100,70 200,80 Q300,90 400,80" stroke="#D6CBBA" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M0,130 Q100,120 200,130 Q300,140 400,130" stroke="#D6CBBA" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M0,180 Q100,170 200,180 Q300,190 400,180" stroke="#D6CBBA" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M0,230 Q100,220 200,230 Q300,240 400,230" stroke="#D6CBBA" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Center icon area -->
  <circle cx="200" cy="140" r="44" fill="#D6CBBA"/>
  <!-- Magnifying glass icon -->
  <circle cx="196" cy="136" r="22" fill="none" stroke="#9E9082" stroke-width="4"/>
  <line x1="212" y1="152" x2="226" y2="166" stroke="#9E9082" stroke-width="4" stroke-linecap="round"/>
  <!-- Question mark -->
  <text x="196" y="143" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#9E9082">?</text>
  <!-- Label -->
  <text x="200" y="210" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="13" fill="#9E9082">照片待上传</text>
  <text x="200" y="230" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#B8ADA0">SPECIMEN PHOTO</text>
</svg>
